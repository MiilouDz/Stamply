<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PDF Label Stamper</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@400;600;700;800&family=Cairo:wght@400;600;700;900&family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700;800&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<style>
/* ─── THEME ─── */
:root{
  --bg:#0f1013;--sur:#16181d;--card:#1c1f26;--bdr:#2a2d38;
  --acc:#f5c842;--red:#e63b28;--grn:#22c55e;
  --txt:#eceaf4;--mut:#656880;--inp:#0b0c0f;
  --shd:rgba(0,0,0,.45);--r:10px;
}
body.light{
  --bg:#eef0f5;--sur:#ffffff;--card:#f5f6fa;--bdr:#d0d3e0;
  --txt:#1a1b2e;--mut:#6a6d90;--inp:#ffffff;--shd:rgba(0,0,0,.1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'Barlow Condensed',sans-serif;min-height:100vh;transition:background .2s,color .2s}
body.ar{font-family:'Cairo',sans-serif}

/* ─── HEADER ─── */
header{
  padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  background:var(--sur);border-bottom:1px solid var(--bdr);
  position:sticky;top:0;z-index:20;box-shadow:0 1px 8px var(--shd);
}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.05em;color:var(--acc);line-height:1;flex-shrink:0}
.logo em{color:var(--red);font-style:normal}
body.ar .logo{font-family:'Cairo',sans-serif;font-weight:900;letter-spacing:0;font-size:1.3rem}
.hd-sub{font-family:'Space Mono',monospace;font-size:.58rem;color:var(--mut)}
body.ar .hd-sub{font-family:'Cairo',sans-serif;font-size:.72rem}
.hcontrols{margin-left:auto;display:flex;align-items:center;gap:7px;flex-shrink:0}
body.ar .hcontrols{margin-left:0;margin-right:auto}
.tgrp{display:flex;border:1px solid var(--bdr);border-radius:8px;overflow:hidden}
.tb{padding:5px 12px;font-size:.76rem;cursor:pointer;background:transparent;border:none;color:var(--mut);font-family:'Barlow Condensed',sans-serif;font-weight:600;transition:all .15s;white-space:nowrap}
.tb.ar-lbl{font-family:'Cairo',sans-serif;font-size:.8rem}
.tb.on{background:var(--acc);color:#000}
.tb:hover:not(.on){color:var(--txt);background:var(--card)}
.tb.theme{padding:5px 10px;font-size:.95rem}

/* ─── LAYOUT ─── */
.workspace{display:grid;grid-template-columns:310px 1fr;min-height:calc(100vh - 50px)}
body.ar .workspace{direction:rtl}
.panel{background:var(--sur);border-right:1px solid var(--bdr);padding:13px 12px;display:flex;flex-direction:column;gap:13px;overflow-y:auto;max-height:calc(100vh - 50px)}
body.ar .panel{border-right:none;border-left:1px solid var(--bdr)}
.stage{padding:16px;display:flex;flex-direction:column;gap:13px;overflow-y:auto}

/* ─── SECTION HEADERS ─── */
.sec{font-family:'Space Mono',monospace;font-size:.56rem;color:var(--mut);text-transform:uppercase;letter-spacing:.14em;margin-bottom:7px;display:flex;align-items:center;gap:7px}
.sec::after{content:'';flex:1;height:1px;background:var(--bdr)}
body.ar .sec{font-family:'Cairo',sans-serif;font-size:.76rem;font-weight:700;text-transform:none;letter-spacing:0;flex-direction:row-reverse}
body.ar .sec::after{order:-1}
.fl{font-size:.72rem;color:var(--mut);margin-bottom:3px;display:block}
body.ar .fl{font-family:'Cairo',sans-serif;font-size:.78rem}

/* ─── INPUTS ─── */
input[type=text],input[type=number]{background:var(--inp);border:1px solid var(--bdr);border-radius:7px;padding:7px 10px;color:var(--txt);font-family:'Barlow Condensed',sans-serif;font-size:.9rem;font-weight:700;outline:none;transition:border-color .2s,background .2s;width:100%}
input[type=text]:focus,input[type=number]:focus{border-color:var(--acc)}
body.ar input[type=text]{font-family:'Cairo',sans-serif}
input[type=number]{text-align:center;-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button{opacity:.4}

/* ─── PILLS ─── */
.pills{display:flex;flex-wrap:wrap;gap:4px}
body.ar .pills{flex-direction:row-reverse}
.pill{background:var(--inp);border:1px solid var(--bdr);border-radius:6px;padding:3px 8px;font-size:.73rem;cursor:pointer;color:var(--mut);transition:all .15s;white-space:nowrap}
.pill:hover{border-color:var(--txt);color:var(--txt)}
.pill.on{border-color:var(--acc);background:color-mix(in srgb,var(--acc) 14%,transparent);color:var(--acc)}
body.ar .pill{font-family:'Cairo',sans-serif;font-size:.78rem}

/* ─── DROP ZONE ─── */
.dz{border:2px dashed var(--bdr);border-radius:var(--r);padding:14px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.dz:hover,.dz.over{border-color:var(--acc);background:color-mix(in srgb,var(--acc) 6%,transparent)}
.dz input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.dz h3{font-size:.9rem;font-weight:700}
.dz p{font-size:.67rem;color:var(--mut);font-family:'Space Mono',monospace;margin-top:2px}
body.ar .dz h3,body.ar .dz p{font-family:'Cairo',sans-serif}

/* ─── FILE LIST ─── */
.flist{display:flex;flex-direction:column;gap:4px;margin-top:6px;max-height:120px;overflow-y:auto}
.fitem{background:var(--inp);border:1px solid var(--bdr);border-radius:6px;padding:5px 9px;display:flex;align-items:center;gap:7px;font-size:.72rem}
.fitem .fname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fitem .fpages{font-family:'Space Mono',monospace;font-size:.62rem;color:var(--mut);flex-shrink:0}
.fitem .fx{color:var(--red);cursor:pointer;font-weight:700;flex-shrink:0;padding:0 2px}
.fitem .fx:hover{color:#ff6b5a}

/* ─── LABEL LIST ─── */
.lbl-list{display:flex;flex-direction:column;gap:5px}
.lbl-item{
  border:2px solid var(--bdr);border-radius:8px;padding:8px 10px;
  cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s;
  background:var(--inp);
}
.lbl-item:hover{border-color:var(--mut)}
.lbl-item.active{border-color:var(--acc);background:color-mix(in srgb,var(--acc) 8%,transparent)}
.lbl-swatch{width:18px;height:18px;border-radius:4px;flex-shrink:0;border:1px solid rgba(255,255,255,.1)}
.lbl-text{flex:1;font-size:.82rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lbl-badge{font-family:'Space Mono',monospace;font-size:.57rem;color:var(--mut);flex-shrink:0}
.lbl-del{color:var(--red);cursor:pointer;font-weight:700;padding:0 3px;font-size:.9rem;flex-shrink:0}
.lbl-del:hover{color:#ff6b5a}
.lbl-add{
  border:2px dashed var(--bdr);border-radius:8px;padding:8px;
  text-align:center;cursor:pointer;color:var(--acc);font-size:.8rem;font-weight:700;
  transition:all .15s;background:transparent;width:100%;font-family:'Barlow Condensed',sans-serif;
}
body.ar .lbl-add{font-family:'Cairo',sans-serif}
.lbl-add:hover{border-color:var(--acc);background:color-mix(in srgb,var(--acc) 8%,transparent)}

/* ─── LABEL EDITOR (collapsible panel per label) ─── */
.lbl-editor{display:flex;flex-direction:column;gap:11px;background:color-mix(in srgb,var(--acc) 4%,var(--card));border:1px solid color-mix(in srgb,var(--acc) 25%,var(--bdr));border-radius:9px;padding:12px 11px;margin-top:2px}

/* ─── STYLE CARDS ─── */
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.sc{background:var(--inp);border:2px solid var(--bdr);border-radius:7px;padding:6px 3px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .15s}
.sc:hover{border-color:var(--mut)}
.sc.on{border-color:var(--acc);background:color-mix(in srgb,var(--acc) 10%,transparent)}
.sp{width:50px;height:24px;display:flex;align-items:center;justify-content:center}
.sp canvas{max-width:50px;max-height:24px;display:block}
.sn{font-size:.58rem;font-family:'Space Mono',monospace;color:var(--mut);text-align:center}
.sc.on .sn{color:var(--acc)}
body.ar .sn{font-family:'Cairo',sans-serif;font-size:.68rem}

/* ─── FONT GRID ─── */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.fc{background:var(--inp);border:2px solid var(--bdr);border-radius:6px;padding:6px 8px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:1px}
.fc:hover{border-color:var(--mut)}
.fc.on{border-color:var(--acc);background:color-mix(in srgb,var(--acc) 10%,transparent)}
.fp{font-size:.95rem;color:var(--txt);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fn{font-size:.55rem;font-family:'Space Mono',monospace;color:var(--mut)}
.fc.on .fn{color:var(--acc)}
body.ar .fn{font-family:'Cairo',sans-serif;font-size:.64rem}

/* ─── COLORS ─── */
.crow{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
body.ar .crow{flex-direction:row-reverse}
.sw{width:24px;height:24px;border-radius:5px;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;flex-shrink:0}
.sw:hover{transform:scale(1.15)}
.sw.on{border-color:var(--acc)}
.cw{position:relative;width:24px;height:24px;flex-shrink:0}
.cw input{opacity:0;position:absolute;inset:0;cursor:pointer;width:100%;height:100%}
.cs{width:24px;height:24px;border-radius:5px;background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red);pointer-events:none;border:2px solid transparent}
.cw.on .cs{border-color:var(--acc)}

/* ─── SLIDER ─── */
.sr{display:flex;align-items:center;gap:7px}
body.ar .sr{flex-direction:row-reverse}
input[type=range]{flex:1;accent-color:var(--acc)}
.vt{font-family:'Space Mono',monospace;font-size:.65rem;min-width:30px;text-align:right;color:var(--txt)}
body.ar .vt{text-align:left}

/* ─── POSITION CONTROLS ─── */
.pos-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;align-items:end}
.pos-field{display:flex;flex-direction:column;gap:3px}
.pos-field label{font-size:.68rem;color:var(--mut);text-align:center}
body.ar .pos-field label{font-family:'Cairo',sans-serif;font-size:.72rem}
.numrow{display:flex;align-items:center;border:1px solid var(--bdr);border-radius:7px;overflow:hidden;background:var(--inp)}
.numrow input[type=number]{border:none;border-radius:0;background:transparent;font-size:.85rem;padding:6px 3px;min-width:0}
.nb{background:transparent;border:none;color:var(--mut);cursor:pointer;padding:0 7px;font-size:1.05rem;line-height:1;transition:color .15s;flex-shrink:0;align-self:stretch;display:flex;align-items:center}
.nb:hover{color:var(--acc)}
.qpos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-top:6px}
.qpb{background:var(--inp);border:1px solid var(--bdr);border-radius:5px;padding:5px 2px;font-size:.58rem;font-family:'Space Mono',monospace;color:var(--mut);cursor:pointer;text-align:center;transition:all .15s}
.qpb:hover{border-color:var(--acc);color:var(--acc)}
body.ar .qpb{font-family:'Cairo',sans-serif;font-size:.65rem}

/* ─── CANVAS AREA ─── */
.hint{font-family:'Space Mono',monospace;font-size:.66rem;color:var(--mut);text-align:center}
.hint b{color:var(--acc)}
body.ar .hint{font-family:'Cairo',sans-serif;font-size:.75rem}
#co{position:relative;display:inline-block;border:2px solid var(--bdr);border-radius:var(--r);overflow:hidden;cursor:crosshair;align-self:flex-start;transition:border-color .2s;max-width:100%}
#co:hover{border-color:color-mix(in srgb,var(--acc) 50%,var(--bdr))}
#co.dragging{cursor:grabbing;border-color:var(--acc)}
#bc{display:block;max-width:100%}
#oc{position:absolute;top:0;left:0;pointer-events:none;max-width:100%}

/* ─── PAGE STRIP ─── */
#strip{display:flex;gap:6px;flex-wrap:wrap}
body.ar #strip{flex-direction:row-reverse}
.pt{border:2px solid var(--bdr);border-radius:6px;overflow:hidden;cursor:pointer;transition:border-color .15s;position:relative;flex-shrink:0}
.pt:hover{border-color:var(--mut)}
.pt.on{border-color:var(--acc)}
.pt canvas{display:block}
.pn{position:absolute;bottom:2px;right:3px;font-size:.55rem;font-family:'Space Mono',monospace;color:#fff;text-shadow:0 0 3px #000}
body.ar .pn{right:auto;left:3px}

/* ─── ACTION BAR ─── */
.abar{display:flex;gap:8px;align-items:center;padding-top:4px;flex-wrap:wrap}
body.ar .abar{flex-direction:row-reverse}
.bdl{background:var(--acc);color:#000;border:none;border-radius:7px;padding:10px 22px;font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:.06em;cursor:pointer;transition:opacity .2s,transform .15s}
.bdl:hover{opacity:.85;transform:translateY(-1px)}
.bdl:disabled{opacity:.35;cursor:not-allowed;transform:none}
body.ar .bdl{font-family:'Cairo',sans-serif;font-weight:800;letter-spacing:0;font-size:.9rem}
.bsc{background:transparent;color:var(--mut);border:1px solid var(--bdr);border-radius:7px;padding:9px 13px;font-family:'Barlow Condensed',sans-serif;font-size:.88rem;cursor:pointer;transition:all .2s}
.bsc:hover{border-color:var(--txt);color:var(--txt)}
body.ar .bsc{font-family:'Cairo',sans-serif}
#stat{font-family:'Space Mono',monospace;font-size:.67rem;color:var(--acc);margin-left:auto}
body.ar #stat{margin-left:0;margin-right:auto;font-family:'Cairo',sans-serif}
#stat.err{color:var(--red)}

/* ─── MISC ─── */
.cf-row{display:flex;gap:5px;margin-top:7px}
body.ar .cf-row{flex-direction:row-reverse}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
@media(max-width:700px){
  .workspace{grid-template-columns:1fr}
  body.ar .workspace{grid-template-columns:1fr}
  .panel{max-height:none;border-right:none;border-left:none;border-bottom:1px solid var(--bdr)}
}
</style>
</head>
<body>

<header>
  <div class="logo" id="logo-txt">PDF <em>Label</em> Stamper</div>
  <span class="hd-sub" id="hdr-sub">multi-file · multi-label · drag to place</span>
  <div class="hcontrols">
    <div class="tgrp">
      <button class="tb theme on" id="btn-dark"  onclick="setTheme('dark')"  title="Dark">🌙</button>
      <button class="tb theme"    id="btn-light" onclick="setTheme('light')" title="Light">☀️</button>
    </div>
    <div class="tgrp">
      <button class="tb on"    id="btn-en" onclick="setLang('en')">EN</button>
      <button class="tb ar-lbl" id="btn-ar" onclick="setLang('ar')">عربي</button>
    </div>
  </div>
</header>

<div class="workspace">
<!-- ════ PANEL ════ -->
<div class="panel">

  <!-- FILES -->
  <div>
    <div class="sec" data-i="sec_files">PDF Files</div>
    <div class="dz" id="dz">
      <input type="file" id="fi" accept="application/pdf" multiple/>
      <h3 data-i="drop_title">Drop multiple PDFs here</h3>
      <p data-i="drop_sub">or click to browse — each PDF can have multiple pages</p>
    </div>
    <div class="flist" id="flist"></div>
  </div>

  <!-- FORMAT -->
  <div>
    <div class="sec" data-i="sec_format">Page Format</div>
    <div class="pills" id="fmts">
      <div class="pill on" data-f="150x100">150×100mm</div>
      <div class="pill" data-f="A4">A4</div>
      <div class="pill" data-f="A5">A5</div>
      <div class="pill" data-f="Letter">Letter</div>
      <div class="pill" data-f="A6">A6</div>
      <div class="pill" data-f="custom" data-i="custom_pill">Custom…</div>
    </div>
    <div id="cfmt" style="display:none">
      <div class="cf-row">
        <input type="text" id="cfw" style="width:72px" placeholder="W mm"/>
        <input type="text" id="cfh" style="width:72px" placeholder="H mm"/>
        <button class="bsc" id="apcf" style="padding:6px 9px;font-size:.8rem" data-i="ok_btn">OK</button>
      </div>
    </div>
  </div>

  <!-- LABELS LIST -->
  <div>
    <div class="sec" data-i="sec_labels">Labels</div>
    <div class="lbl-list" id="lbl-list"></div>
    <button class="lbl-add" id="lbl-add-btn" data-i="btn_add_label">＋ Add Label</button>
  </div>

  <!-- LABEL EDITOR (renders dynamically here) -->
  <div id="lbl-editor-wrap"></div>

</div><!-- /panel -->

<!-- ════ STAGE ════ -->
<div class="stage">
  <p class="hint"><b>👆</b> <span data-i="hint">Click or drag to place the active label</span></p>

  <!-- POSITION -->
  <div>
    <div class="sec" data-i="sec_pos">Active Label Position</div>
    <div class="pos-grid">
      <div class="pos-field">
        <label data-i="lbl_x">X (mm)</label>
        <div class="numrow">
          <button class="nb" id="x-dec">−</button>
          <input type="number" id="inp-x" value="0" step="1"/>
          <button class="nb" id="x-inc">+</button>
        </div>
      </div>
      <div class="pos-field">
        <label data-i="lbl_y">Y (mm)</label>
        <div class="numrow">
          <button class="nb" id="y-dec">−</button>
          <input type="number" id="inp-y" value="0" step="1"/>
          <button class="nb" id="y-inc">+</button>
        </div>
      </div>
      <div class="pos-field">
        <label data-i="lbl_rot">Rotation °</label>
        <div class="numrow">
          <button class="nb" id="r-dec">−</button>
          <input type="number" id="inp-r" value="0" min="-180" max="180" step="5"/>
          <button class="nb" id="r-inc">+</button>
        </div>
      </div>
    </div>
    <div class="qpos-grid" id="qpos"></div>
  </div>

  <!-- CANVAS -->
  <div id="co"><canvas id="bc"></canvas><canvas id="oc"></canvas></div>

  <!-- PAGES -->
  <div>
    <div class="sec" style="margin-bottom:8px" data-i="sec_pages">Pages</div>
    <div id="strip"></div>
  </div>

  <div class="abar">
    <button class="bsc" id="clr" data-i="btn_clear">Clear all</button>
    <button class="bdl" id="dlb" disabled data-i="btn_dl">⬇ Download Stamped PDF</button>
    <span id="stat"></span>
  </div>
</div>
</div>

<script>
'use strict';
/* ════════════════════════════════════════════
   i18n
════════════════════════════════════════════ */
const I18N={
  en:{
    sec_files:'PDF Files',drop_title:'Drop multiple PDFs here',drop_sub:'or click to browse — each PDF can have multiple pages',
    sec_format:'Page Format',custom_pill:'Custom…',ok_btn:'OK',
    sec_labels:'Labels',btn_add_label:'＋ Add Label',
    sec_pos:'Active Label Position',lbl_x:'X (mm)',lbl_y:'Y (mm)',lbl_rot:'Rotation °',
    sec_pages:'Pages',hint:'Click or drag to place the active label',
    btn_clear:'Clear all',btn_dl:'⬇ Download Stamped PDF',
    logo:'PDF <em>Label</em> Stamper',hdr_sub:'multi-file · multi-label · drag to place',
    lbl_editor:'Editing Label',lbl_text:'Text',lbl_fontsize:'Font size (pt)',lbl_opacity:'Opacity',
    sec_font:'Font',sec_style:'Stamp Style',
    sec_rectcol:'Rectangle Color',sec_textcol:'Text Color',sec_bordcol:'Border Color',
    style_solid:'Solid',style_outline:'Outline',style_double:'Double',
    style_stamp:'Stamp',style_grunge:'Grunge',style_ribbon:'Ribbon',
    qp_tl:'↖ TL',qp_tc:'↑ TC',qp_tr:'↗ TR',
    qp_ml:'← ML',qp_mc:'⊙ C',qp_mr:'→ MR',
    qp_bl:'↙ BL',qp_bc:'↓ BC',qp_br:'↘ BR',
    st_stamp:'Stamping…',st_done:'✓ Done!',st_empty:'⚠ Label text empty',
    pages_count:'pg',
  },
  ar:{
    sec_files:'ملفات PDF',drop_title:'أفلت ملفات PDF هنا',drop_sub:'أو انقر للاستعراض — كل ملف يمكن أن يحتوي على صفحات متعددة',
    sec_format:'حجم الصفحة',custom_pill:'مخصص…',ok_btn:'تطبيق',
    sec_labels:'التسميات',btn_add_label:'＋ إضافة تسمية',
    sec_pos:'موضع التسمية النشطة',lbl_x:'X (mm)',lbl_y:'Y (mm)',lbl_rot:'الدوران °',
    sec_pages:'الصفحات',hint:'انقر أو اسحب لوضع التسمية النشطة',
    btn_clear:'مسح الكل',btn_dl:'⬇ تنزيل PDF المختوم',

  {id:'bebas', fam:"'Bebas Neue',Impact",    lbl:'Bebas Neue',prev:'STAMP',ar:false},
  {id:'cairo', fam:"'Cairo',sans-serif",     lbl:'Cairo — القاهرة',prev:'ختم',ar:true},
  {id:'amiri', fam:"'Amiri',serif",           lbl:'Amiri — أميري',prev:'طلب',ar:true},
  {id:'tajw',  fam:"'Tajawal',sans-serif",   lbl:'Tajawal — تجوال',prev:'سري',ar:true},
  {id:'sche',  fam:"'Scheherazade New',serif",lbl:'Scheherazade',prev:'ختم',ar:true},
];
const STYLES_DEF=[
  {id:'solid',nk:'style_solid'},{id:'outline',nk:'style_outline'},
  {id:'double',nk:'style_double'},{id:'stamp',nk:'style_stamp'},
  {id:'grunge',nk:'style_grunge'},{id:'ribbon',nk:'style_ribbon'},
];
const FMTS={'150x100':{w:150,h:100},A4:{w:210,h:297},A5:{w:148,h:210},Letter:{w:215.9,h:279.4},A6:{w:105,h:148}};
const MARGIN=6;
const RP=[{r:220,g:30,b:30},{r:0,g:135,b:60},{r:0,g:80,b:200},{r:240,g:155,b:0},{r:10,g:10,b:10},{r:95,g:0,b:165},{r:255,g:255,b:255}];
const TP=[{r:255,g:255,b:255},{r:0,g:0,b:0},{r:240,g:224,b:0},{r:180,g:240,b:255}];
const BP=[{r:160,g:15,b:15},{r:0,g:80,b:30},{r:0,g:40,b:150},{r:170,g:90,b:0},{r:50,g:50,b:50},{r:210,g:210,b:180}];

/* ════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════ */
const mm2pt=m=>m/0.352778, pt2mm=p=>p*0.352778;
const rgb2h=({r,g,b})=>'#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
const h2rgb=h=>({r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)});
const fr=({r,g,b})=>({r:r/255,g:g/255,b:b/255});
const deepCopy=o=>JSON.parse(JSON.stringify(o));

const _mc=document.createElement('canvas'),_mx=_mc.getContext('2d');
function measW(txt,fsPx,fam){_mx.font=`bold ${fsPx}px ${fam}`;return _mx.measureText(txt).width;}

function getFam(fontId){return(FONTS.find(f=>f.id===fontId)||FONTS[0]).fam;}
function isAr(fontId){return !!(FONTS.find(f=>f.id===fontId)||{}).ar;}

function ldims(txt,fs,fontId){
  const fam=getFam(fontId);
  const mw=measW(txt,fs*1.15,fam);
  const ph=fs*.55,pv=fs*.38;
  return{rectW:Math.max(mw+ph*2,fs*2.5),rectH:fs+pv*2,padH:ph,padV:pv};
}
function defPos(pw,ph,rw,rh){return{x:pw-MARGIN-rw,y:ph-MARGIN-rh};}

let labelCounter=0;
function mkLabel(overrides={}){
  labelCounter++;
  return Object.assign({
    id:labelCounter,
    text:'LABEL '+labelCounter,
    fontSize:11,opacity:1,
    style:'solid',fontId:'barlow',rotation:0,
    rectColor:{r:220,g:30,b:30},
    textColor:{r:255,g:255,b:255},
    bordColor:{r:160,g:15,b:15},
    labelX:null,labelY:null,
  },overrides);
}

const S={
  files:[],            // {name, buf, pageCount}
  format:{w:150,h:100},
  labels:[mkLabel({text:'PRIVATE ORDER'})],
  activeLabel:1,       // id of active label
  currentPage:0,
  allPages:[],         // {name,buf,pidx,doc}
};

let ptW=1,ptH=1,canvasScale=1;

function getAL(){return S.labels.find(l=>l.id===S.activeLabel)||S.labels[0];}
function getPos(lbl,pw,ph){
  const{rectW,rectH}=ldims(lbl.text||'x',lbl.fontSize,lbl.fontId);
  if(lbl.labelX!==null&&lbl.labelY!==null)return{x:lbl.labelX,y:lbl.labelY};
  return defPos(pw,ph,rectW,rectH);
}

const stageEl=document.querySelector('.stage');
function maxW(){return Math.max(200,(stageEl.clientWidth||700)-36);}

/* ════════════════════════════════════════════
   DRAWING
════════════════════════════════════════════ */
function rr(ctx,x,y,w,h,r){
  ctx.beginPath();
  if(ctx.roundRect){ctx.roundRect(x,y,w,h,r);}
  else{ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function ctxTxt(ctx,txt,cx,cy,fsPx,fam,col){
  ctx.fillStyle=col;ctx.font=`bold ${fsPx}px ${fam}`;
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText(txt,cx,cy);
}
function drawLabelOnCanvas(ctx,lbl,ptPageW,ptPageH,sc,isActive){
  const{rectW,rectH,padH,padV}=ldims(lbl.text||'',lbl.fontSize,lbl.fontId);
  const rw=rectW*sc,rh=rectH*sc,ph=padH*sc,pv=padV*sc;
  const{x:ptX,y:ptY}=getPos(lbl,ptPageW,ptPageH);
  const cx=(ptX*sc)+rw/2, cy=((ptPageH-ptY-rectH)*sc)+rh/2;
  const x=ptX*sc, y=(ptPageH-ptY-rectH)*sc;
  const fsPx=lbl.fontSize*sc;
  const fam=getFam(lbl.fontId);
  const rc=lbl.rectColor,tc=lbl.textColor,bc=lbl.bordColor;
  ctx.save();
  ctx.globalAlpha=lbl.opacity*(isActive?1:.85);
  if(lbl.rotation){ctx.translate(cx,cy);ctx.rotate(lbl.rotation*Math.PI/180);ctx.translate(-cx,-cy);}
  switch(lbl.style){
    case'solid':
      ctx.fillStyle=rgb2h(rc);rr(ctx,x,y,rw,rh,rh*.18);ctx.fill();
      ctxTxt(ctx,lbl.text,cx,cy,fsPx,fam,rgb2h(tc));break;
    case'outline':
      ctx.strokeStyle=rgb2h(rc);ctx.lineWidth=Math.max(1.5,rh*.09);
      rr(ctx,x,y,rw,rh,rh*.18);ctx.stroke();
      ctxTxt(ctx,lbl.text,cx,cy,fsPx,fam,rgb2h(rc));break;
    case'double':{const g=rh*.13;
      ctx.fillStyle=rgb2h(rc);rr(ctx,x,y,rw,rh,rh*.14);ctx.fill();
      ctx.strokeStyle=rgb2h(bc);ctx.lineWidth=Math.max(1,rh*.065);
      rr(ctx,x+g,y+g,rw-g*2,rh-g*2,rh*.08);ctx.stroke();
      ctxTxt(ctx,lbl.text,cx,cy,fsPx,fam,rgb2h(tc));break;}
    case'stamp':{const bw=Math.max(2,rh*.1);
      ctx.strokeStyle=rgb2h(rc);ctx.lineWidth=bw*1.4;ctx.setLineDash([rh*.28,rh*.1]);
      rr(ctx,x+bw,y+bw,rw-bw*2,rh-bw*2,rh*.14);ctx.stroke();ctx.setLineDash([]);
      ctxTxt(ctx,lbl.text,cx,cy,fsPx,fam,rgb2h(rc));break;}
    case'grunge':{const bw=Math.max(2,rh*.1);
      ctx.strokeStyle=rgb2h(rc);ctx.lineWidth=bw*1.6;ctx.setLineDash([rh*.13,rh*.07]);
      rr(ctx,x+bw,y+bw,rw-bw*2,rh-bw*2,rh*.14);ctx.stroke();ctx.setLineDash([]);
      ctx.shadowColor=rgb2h(rc);ctx.shadowBlur=fsPx*.22;
      ctxTxt(ctx,lbl.text,cx,cy,fsPx,fam,rgb2h(rc));
      ctx.shadowBlur=0;
      const oa=ctx.globalAlpha;ctx.globalAlpha=oa*.28;
      ctx.strokeStyle=rgb2h(rc);ctx.lineWidth=Math.max(1,rh*.05);
      [[.22,.95,.3],[.5,.98,.52],[.72,.92,.75]].forEach(([y1,x2,y2])=>{ctx.beginPath();ctx.moveTo(x+rw*.02,y+rh*y1);ctx.lineTo(x+rw*x2,y+rh*y2);ctx.stroke();});
      ctx.globalAlpha=oa;break;}
    case'ribbon':{
      ctx.save();ctx.translate(cx,cy);ctx.rotate(-Math.PI/18);ctx.translate(-cx,-cy);
      const eg=rh*.15;
      ctx.fillStyle=rgb2h(rc);
      ctx.beginPath();ctx.moveTo(x-eg,y);ctx.lineTo(x+rw+eg,y);ctx.lineTo(x+rw,y+rh);ctx.lineTo(x,y+rh);ctx.closePath();ctx.fill();
      ctx.strokeStyle=rgb2h(bc);ctx.lineWidth=Math.max(1,rh*.06);
      ctx.beginPath();ctx.moveTo(x-eg+rh*.18,y+rh*.18);ctx.lineTo(x+rw+eg-rh*.18,y+rh*.18);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x-eg+rh*.18,y+rh*.82);ctx.lineTo(x+rw+eg-rh*.18,y+rh*.82);ctx.stroke();
      ctxTxt(ctx,lbl.text,cx,cy,fsPx*.92,fam,rgb2h(tc));ctx.restore();break;}
  }
  // active highlight: draw selection box
  if(isActive){
    ctx.restore();ctx.save();
    if(lbl.rotation){ctx.translate(cx,cy);ctx.rotate(lbl.rotation*Math.PI/180);ctx.translate(-cx,-cy);}
    ctx.strokeStyle='rgba(245,200,66,.8)';ctx.lineWidth=2;ctx.setLineDash([5,3]);
    ctx.strokeRect(x-2,y-2,rw+4,rh+4);ctx.setLineDash([]);
  }
  ctx.restore();
}

function redrw(){
  renderEditor(); // keep editor in sync
  const oc=document.getElementById('oc');
  if(!oc.width)return;
  const ctx=oc.getContext('2d');
  ctx.clearRect(0,0,oc.width,oc.height);
  // draw non-active first, active on top
  const inactive=S.labels.filter(l=>l.id!==S.activeLabel);
  const active=S.labels.find(l=>l.id===S.activeLabel);
  inactive.forEach(l=>drawLabelOnCanvas(ctx,l,ptW,ptH,canvasScale,false));
  if(active)drawLabelOnCanvas(ctx,active,ptW,ptH,canvasScale,true);
  syncPosInputs();
}

/* ════════════════════════════════════════════
   LABEL LIST UI
════════════════════════════════════════════ */
function renderLabelList(){
  const list=document.getElementById('lbl-list');
  list.innerHTML='';
  S.labels.forEach(lbl=>{
    const item=document.createElement('div');
    item.className='lbl-item'+(lbl.id===S.activeLabel?' active':'');
    // color swatch
    const sw=document.createElement('div');sw.className='lbl-swatch';
    sw.style.background=rgb2h(lbl.rectColor);
    // text
    const tx=document.createElement('div');tx.className='lbl-text';
    tx.style.fontFamily=getFam(lbl.fontId);
    tx.style.direction=isAr(lbl.fontId)?'rtl':'ltr';
    tx.textContent=lbl.text||'(empty)';
    // style badge
    const bd=document.createElement('div');bd.className='lbl-badge';
    bd.textContent=lbl.style;
    // delete
    const dl=document.createElement('span');dl.className='lbl-del';dl.textContent='✕';
    dl.onclick=e=>{e.stopPropagation();deleteLabel(lbl.id);};
    item.appendChild(sw);item.appendChild(tx);item.appendChild(bd);item.appendChild(dl);
    item.onclick=()=>selectLabel(lbl.id);
    list.appendChild(item);
  });
}

function selectLabel(id){
  S.activeLabel=id;
  renderLabelList();
  renderEditor();
  redrw();
}
function deleteLabel(id){
  if(S.labels.length===1)return; // keep at least one
  S.labels=S.labels.filter(l=>l.id!==id);
  if(S.activeLabel===id)S.activeLabel=S.labels[S.labels.length-1].id;
  renderLabelList();renderEditor();redrw();
}
document.getElementById('lbl-add-btn').onclick=()=>{
  const newL=mkLabel();
  S.labels.push(newL);
  S.activeLabel=newL.id;
  renderLabelList();renderEditor();redrw();
};

/* ════════════════════════════════════════════
   LABEL EDITOR
════════════════════════════════════════════ */
function renderEditor(){
  const wrap=document.getElementById('lbl-editor-wrap');
  const lbl=getAL();
  if(!lbl){wrap.innerHTML='';return;}

  // rebuild editor HTML fresh (avoids stale event listeners via innerHTML)
  wrap.innerHTML='';
  const ed=document.createElement('div');
  ed.className='lbl-editor';

  // ── TEXT ──
  const textDiv=document.createElement('div');
  const tl=document.createElement('label');tl.className='fl';tl.setAttribute('data-i','lbl_text');tl.textContent=t('lbl_text');
  const ti=document.createElement('input');ti.type='text';ti.value=lbl.text;
  const fobj=FONTS.find(f=>f.id===lbl.fontId)||FONTS[0];
  ti.style.fontFamily=fobj.fam;ti.dir=fobj.ar?'rtl':'ltr';
  ti.oninput=e=>{lbl.text=e.target.value;renderLabelList();redrw();};
  textDiv.appendChild(tl);textDiv.appendChild(ti);
  ed.appendChild(textDiv);

  // ── FONT SIZE ──
  const fsDiv=document.createElement('div');
  const fsl=document.createElement('label');fsl.className='fl';fsl.setAttribute('data-i','lbl_fontsize');fsl.textContent=t('lbl_fontsize');
  const fsr=document.createElement('div');fsr.className='sr';
  const fsSlider=document.createElement('input');fsSlider.type='range';fsSlider.min=5;fsSlider.max=30;fsSlider.value=lbl.fontSize;
  const fsVt=document.createElement('span');fsVt.className='vt';fsVt.textContent=lbl.fontSize;
  fsSlider.oninput=()=>{lbl.fontSize=+fsSlider.value;fsVt.textContent=fsSlider.value;renderLabelList();redrw();};
  fsr.appendChild(fsSlider);fsr.appendChild(fsVt);
  fsDiv.appendChild(fsl);fsDiv.appendChild(fsr);ed.appendChild(fsDiv);

  // ── OPACITY ──
  const opDiv=document.createElement('div');
  const opl=document.createElement('label');opl.className='fl';opl.setAttribute('data-i','lbl_opacity');opl.textContent=t('lbl_opacity');
  const opr=document.createElement('div');opr.className='sr';
  const opSlider=document.createElement('input');opSlider.type='range';opSlider.min=10;opSlider.max=100;opSlider.value=Math.round(lbl.opacity*100);opSlider.style.accentColor='var(--red)';
  const opVt=document.createElement('span');opVt.className='vt';opVt.textContent=Math.round(lbl.opacity*100)+'%';
  opSlider.oninput=()=>{lbl.opacity=+opSlider.value/100;opVt.textContent=opSlider.value+'%';redrw();};
  opr.appendChild(opSlider);opr.appendChild(opVt);
  opDiv.appendChild(opl);opDiv.appendChild(opr);ed.appendChild(opDiv);

  // ── FONT ──
  const fontSec=makeSec(t('sec_font'));ed.appendChild(fontSec);
  const fg=document.createElement('div');fg.className='fgrid';
  FONTS.forEach(f=>{
    const c=document.createElement('div');c.className='fc'+(lbl.fontId===f.id?' on':'');
    const pv=document.createElement('div');pv.className='fp';pv.style.fontFamily=f.fam;pv.style.direction=f.ar?'rtl':'ltr';pv.textContent=f.prev;
    const nm=document.createElement('div');nm.className='fn';nm.textContent=f.lbl;
    c.appendChild(pv);c.appendChild(nm);
    c.onclick=()=>{lbl.fontId=f.id;ti.style.fontFamily=f.fam;ti.dir=f.ar?'rtl':'ltr';renderLabelList();renderEditor();redrw();};
    fg.appendChild(c);
  });
  ed.appendChild(fg);

  // ── STYLE ──
  const styleSec=makeSec(t('sec_style'));ed.appendChild(styleSec);
  const sg=document.createElement('div');sg.className='sgrid';
  STYLES_DEF.forEach(st=>{
    const c=document.createElement('div');c.className='sc'+(lbl.style===st.id?' on':'');
    const sp=document.createElement('div');sp.className='sp';
    const cv=document.createElement('canvas');cv.width=50;cv.height=24;
    const ctx=cv.getContext('2d');
    const ptxt=isAr(lbl.fontId)?'ختم':'LABEL',pfs=6;
    const{rectW:rw2,rectH:rh2,padH:ph2,padV:pv2}=ldims(ptxt,pfs,lbl.fontId);
    const sc2=20/rh2,rws=rw2*sc2,rhs=rh2*sc2,ox=(50-rws)/2,oy=(24-rhs)/2;
    drawStylePreview(ctx,ox,oy,rws,rhs,ph2*sc2,pv2*sc2,ptxt,pfs*sc2,st.id,lbl.rectColor,lbl.textColor,lbl.bordColor,lbl.fontId);
    sp.appendChild(cv);
    const nm=document.createElement('div');nm.className='sn';nm.textContent=t(st.nk);
    c.appendChild(sp);c.appendChild(nm);
    c.onclick=()=>{lbl.style=st.id;renderLabelList();renderEditor();redrw();};
    sg.appendChild(c);
  });
  ed.appendChild(sg);

  // ── COLORS ──
  ed.appendChild(makeSec(t('sec_rectcol')));
  ed.appendChild(makeSwatches(RP,lbl,'rectColor',()=>{renderLabelList();renderEditor();redrw();}));
  ed.appendChild(makeSec(t('sec_textcol')));
  ed.appendChild(makeSwatches(TP,lbl,'textColor',()=>{renderLabelList();renderEditor();redrw();}));
  ed.appendChild(makeSec(t('sec_bordcol')));
  ed.appendChild(makeSwatches(BP,lbl,'bordColor',()=>{renderLabelList();renderEditor();redrw();}));

  wrap.appendChild(ed);
}

function makeSec(txt){
  const d=document.createElement('div');d.className='sec';d.textContent=txt;return d;
}

function drawStylePreview(ctx,x,y,rw,rh,ph,pv,txt,fsPx,style,rc,tc,bc,fontId){
  const fam=getFam(fontId);const cx=x+rw/2,cy=y+rh/2;
  ctx.save();
  switch(style){
    case'solid':ctx.fillStyle=rgb2h(rc);rr(ctx,x,y,rw,rh,rh*.18);ctx.fill();ctxTxt(ctx,txt,cx,cy,fsPx,fam,rgb2h(tc));break;
    case'outline':ctx.strokeStyle=rgb2h(rc);ctx.lineWidth=Math.max(1,rh*.09);rr(ctx,x,y,rw,rh,rh*.18);ctx.stroke();ctxTxt(ctx,txt,cx,cy,fsPx,fam,rgb2h(rc));break;
    case'double':{const g=rh*.13;ctx.fillStyle=rgb2h(rc);rr(ctx,x,y,rw,rh,rh*.14);ctx.fill();ctx.strokeStyle=rgb2h(bc);ctx.lineWidth=Math.max(1,rh*.065);rr(ctx,x+g,y+g,rw-g*2,rh-g*2,rh*.08);ctx.stroke();ctxTxt(ctx,txt,cx,cy,fsPx,fam,rgb2h(tc));break;}
    case'stamp':{const bw=Math.max(1,rh*.1);ctx.strokeStyle=rgb2h(rc);ctx.lineWidth=bw*1.4;ctx.setLineDash([rh*.28,rh*.1]);rr(ctx,x+bw,y+bw,rw-bw*2,rh-bw*2,rh*.14);ctx.stroke();ctx.setLineDash([]);ctxTxt(ctx,txt,cx,cy,fsPx,fam,rgb2h(rc));break;}
    case'grunge':{const bw=Math.max(1,rh*.1);ctx.strokeStyle=rgb2h(rc);ctx.lineWidth=bw*1.6;ctx.setLineDash([rh*.13,rh*.07]);rr(ctx,x+bw,y+bw,rw-bw*2,rh-bw*2,rh*.14);ctx.stroke();ctx.setLineDash([]);ctx.shadowColor=rgb2h(rc);ctx.shadowBlur=fsPx*.2;ctxTxt(ctx,txt,cx,cy,fsPx,fam,rgb2h(rc));ctx.shadowBlur=0;break;}
    case'ribbon':{ctx.save();ctx.translate(cx,cy);ctx.rotate(-Math.PI/18);ctx.translate(-cx,-cy);const eg=rh*.15;ctx.fillStyle=rgb2h(rc);ctx.beginPath();ctx.moveTo(x-eg,y);ctx.lineTo(x+rw+eg,y);ctx.lineTo(x+rw,y+rh);ctx.lineTo(x,y+rh);ctx.closePath();ctx.fill();ctxTxt(ctx,txt,cx,cy,fsPx*.92,fam,rgb2h(tc));ctx.restore();break;}
  }
  ctx.restore();
}

function makeSwatches(presets,lbl,key,cb){
  const row=document.createElement('div');row.className='crow';
  presets.forEach(col=>{
    const s=document.createElement('div');s.className='sw';s.style.background=rgb2h(col);
    s.classList.toggle('on',JSON.stringify(lbl[key])===JSON.stringify(col));
    s.onclick=()=>{lbl[key]=deepCopy(col);cb();};
    row.appendChild(s);
  });
  const cw=document.createElement('div');cw.className='cw';
  const cb2=document.createElement('div');cb2.className='cs';
  const ci=document.createElement('input');ci.type='color';ci.value=rgb2h(lbl[key]);
  ci.addEventListener('input',()=>{lbl[key]=h2rgb(ci.value);cb();});
  cw.appendChild(cb2);cw.appendChild(ci);
  cw.classList.toggle('on',!presets.some(p=>JSON.stringify(p)===JSON.stringify(lbl[key])));
  row.appendChild(cw);return row;
}

/* ════════════════════════════════════════════
   POSITION INPUTS (shared, for active label)
════════════════════════════════════════════ */
function syncPosInputs(){
  const lbl=getAL();if(!lbl)return;
  const{rectH}=ldims(lbl.text||'x',lbl.fontSize,lbl.fontId);
  const ph=ptH||mm2pt(S.format.h);
  const{x,y}=getPos(lbl,ptW||mm2pt(S.format.w),ph);
  document.getElementById('inp-x').value=Math.round(pt2mm(x)*10)/10;
  document.getElementById('inp-y').value=Math.round(pt2mm(ph-y-rectH)*10)/10;
  document.getElementById('inp-r').value=lbl.rotation;
}
function applyPosInputs(){
  const lbl=getAL();if(!lbl)return;
  const xmm=parseFloat(document.getElementById('inp-x').value)||0;
  const ymm=parseFloat(document.getElementById('inp-y').value)||0;
  const{rectH}=ldims(lbl.text||'x',lbl.fontSize,lbl.fontId);
  const ph=ptH||mm2pt(S.format.h);
  lbl.labelX=mm2pt(xmm);
  lbl.labelY=ph-mm2pt(ymm)-rectH;
  redrw();
}
document.getElementById('inp-x').addEventListener('input',applyPosInputs);
document.getElementById('inp-y').addEventListener('input',applyPosInputs);
document.getElementById('inp-r').addEventListener('input',()=>{
  const lbl=getAL();if(!lbl)return;
  lbl.rotation=parseInt(document.getElementById('inp-r').value)||0;redrw();
});
function stepInput(inpId,delta,isPos){
  const el=document.getElementById(inpId);
  el.value=Math.round(((parseFloat(el.value)||0)+delta)*10)/10;
  if(isPos)applyPosInputs();
  else{const lbl=getAL();if(lbl){lbl.rotation=parseInt(el.value)||0;redrw();}}
}
document.getElementById('x-dec').onclick=()=>stepInput('inp-x',-1,true);
document.getElementById('x-inc').onclick=()=>stepInput('inp-x',1,true);
document.getElementById('y-dec').onclick=()=>stepInput('inp-y',-1,true);
document.getElementById('y-inc').onclick=()=>stepInput('inp-y',1,true);
document.getElementById('r-dec').onclick=()=>stepInput('inp-r',-5,false);
document.getElementById('r-inc').onclick=()=>stepInput('inp-r',5,false);

function applyQuickPos(pos){
  const lbl=getAL();if(!lbl)return;

  const pw=ptW||mm2pt(S.format.w),ph=ptH||mm2pt(S.format.h),M=MARGIN;
  const mp={TL:{x:M,y:ph-M-rectH},TC:{x:(pw-rectW)/2,y:ph-M-rectH},TR:{x:pw-M-rectW,y:ph-M-rectH},
             ML:{x:M,y:(ph-rectH)/2},MC:{x:(pw-rectW)/2,y:(ph-rectH)/2},MR:{x:pw-M-rectW,y:(ph-rectH)/2},
             BL:{x:M,y:M},BC:{x:(pw-rectW)/2,y:M},BR:{x:pw-M-rectW,y:M}};

}

const dzEl=document.getElementById('dz'),fiEl=document.getElementById('fi');
dzEl.addEventListener('dragover',e=>{e.preventDefault();dzEl.classList.add('over');});
dzEl.addEventListener('dragleave',()=>dzEl.classList.remove('over'));

async function handleFiles(fl){
  for(const f of fl){
    if(f.type!=='application/pdf')continue;
    const buf=(await f.arrayBuffer()).slice(0);
    // quick page count via pdf-lib
    let pc=1;
    try{const tmp=await PDFLib.PDFDocument.load(buf.slice(0));pc=tmp.getPageCount();}catch(_){}
    S.files.push({name:f.name,buf,pageCount:pc});
  }
  renderFileList();
  await parsePages();
  rebuildStrip();
  loadPg(0);
  document.getElementById('dlb').disabled=!S.allPages.length;
}

function renderFileList(){
  const fl=document.getElementById('flist');fl.innerHTML='';
  S.files.forEach((f,i)=>{
    const item=document.createElement('div');item.className='fitem';
    const fn=document.createElement('span');fn.className='fname';fn.textContent=f.name;
    const fp=document.createElement('span');fp.className='fpages';fp.textContent=f.pageCount+' '+t('pages_count');
    const fx=document.createElement('span');fx.className='fx';fx.textContent='✕';
    fx.onclick=async()=>{S.files.splice(i,1);renderFileList();await parsePages();rebuildStrip();S.allPages.length?loadPg(0):clearStage();document.getElementById('dlb').disabled=!S.allPages.length;};
    item.appendChild(fn);item.appendChild(fp);item.appendChild(fx);
    fl.appendChild(item);
  });
}

async function parsePages(){
  S.allPages=[];
  const lib=await getPdfJs();
  for(const f of S.files){
    const pdf=await lib.getDocument({data:f.buf.slice(0)}).promise;
    for(let i=1;i<=pdf.numPages;i++)S.allPages.push({name:f.name,buf:f.buf,pidx:i-1,doc:pdf});
  }
}

function clearStage(){
  ['bc','oc'].forEach(id=>{const c=document.getElementById(id);c.width=400;c.height=260;c.getContext('2d').clearRect(0,0,400,260);});
  document.getElementById('strip').innerHTML='';
}

   PDF.js
════════════════════════════════════════════ */
let pdfjs=null;
async function getPdfJs(){
  if(pdfjs)return pdfjs;
  return new Promise(res=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload=()=>{window['pdfjs-dist/build/pdf'].GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';pdfjs=window['pdfjs-dist/build/pdf'];res(pdfjs);};
    document.head.appendChild(s);
  });
}

/* ════════════════════════════════════════════
   PAGE STRIP
════════════════════════════════════════════ */
async function rebuildStrip(){
  const strip=document.getElementById('strip');strip.innerHTML='';
  for(let i=0;i<Math.min(S.allPages.length,40);i++){
    const tc=await mkThumb(i,52);
    const w=document.createElement('div');w.className='pt'+(i===S.currentPage?' on':'');
    w.appendChild(tc);
    const n=document.createElement('span');n.className='pn';n.textContent=i+1;
    w.appendChild(n);w.onclick=()=>loadPg(i);strip.appendChild(w);
  }
}
async function mkThumb(idx,h){
  const{doc,pidx}=S.allPages[idx];
  const pg=await doc.getPage(pidx+1);
  const vp=pg.getViewport({scale:1}),sc=h/vp.height,vp2=pg.getViewport({scale:sc});
  const cv=document.createElement('canvas');cv.width=vp2.width;cv.height=vp2.height;
  await pg.render({canvasContext:cv.getContext('2d'),viewport:vp2}).promise;return cv;
}

   MAIN CANVAS
════════════════════════════════════════════ */
async function loadPg(idx){
  if(!S.allPages.length)return;
  S.currentPage=Math.max(0,Math.min(idx,S.allPages.length-1));
  document.querySelectorAll('.pt').forEach((el,i)=>el.classList.toggle('on',i===S.currentPage));
  const{doc,pidx}=S.allPages[S.currentPage];
  const pg=await doc.getPage(pidx+1);
  const vp1=pg.getViewport({scale:1});
  const sc=Math.min(maxW()/vp1.width,560/vp1.height,2.5);
  ptW=vp1.width;ptH=vp1.height;canvasScale=sc;
  const vp2=pg.getViewport({scale:sc});
  const bc=document.getElementById('bc'),oc=document.getElementById('oc');
  bc.width=vp2.width;bc.height=vp2.height;oc.width=vp2.width;oc.height=vp2.height;
  await pg.render({canvasContext:bc.getContext('2d'),viewport:vp2}).promise;
  redrw();
}

/* ════════════════════════════════════════════
   DRAG PLACEMENT — events on #co container
   (overlay #oc has pointer-events:none)
════════════════════════════════════════════ */
const coEl=document.getElementById('co');
let isDrag=false,dox=0,doy=0;

function hitTest(lbl,mx,my){
  const{rectW,rectH}=ldims(lbl.text||'x',lbl.fontSize,lbl.fontId);
  const{x:ptX,y:ptY}=getPos(lbl,ptW,ptH);
  const cx2=(ptX*canvasScale)+rectW*canvasScale/2;
  const cy2=((ptH-ptY-rectH)*canvasScale)+rectH*canvasScale/2;
  // un-rotate mouse point
  const dx=mx-cx2,dy=my-cy2;
  const ang=-lbl.rotation*Math.PI/180;
  const rx=dx*Math.cos(ang)-dy*Math.sin(ang);
  const ry=dx*Math.sin(ang)+dy*Math.cos(ang);
  const hw=rectW*canvasScale/2,hh=rectH*canvasScale/2;
  return rx>=-hw&&rx<=hw&&ry>=-hh&&ry<=hh;
}

coEl.addEventListener('mousedown',e=>{
  if(!S.allPages.length)return;
  e.preventDefault();
  const r=coEl.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;

  // Check if clicked on any label (active first, then others)
  const ordered=[...S.labels].sort((a,b)=>(a.id===S.activeLabel?1:0)-(b.id===S.activeLabel?1:0));
  let hit=null;
  for(let i=ordered.length-1;i>=0;i--){if(hitTest(ordered[i],mx,my)){hit=ordered[i];break;}}

  if(hit){
    if(hit.id!==S.activeLabel){selectLabel(hit.id);}
    const lbl=hit;
    const{rectW,rectH}=ldims(lbl.text||'x',lbl.fontSize,lbl.fontId);
    const{x:ptX,y:ptY}=getPos(lbl,ptW,ptH);
    dox=mx-ptX*canvasScale;
    doy=my-(ptH-ptY-rectH)*canvasScale;
    isDrag=true;coEl.classList.add('dragging');
  } else {
    // place active label at click
    const lbl=getAL();if(!lbl)return;
    const{rectW,rectH}=ldims(lbl.text||'x',lbl.fontSize,lbl.fontId);
    const rw2=rectW*canvasScale,rh2=rectH*canvasScale;
    dox=rw2/2;doy=rh2/2;isDrag=true;
    coEl.classList.add('dragging');
    lbl.labelX=(mx-dox)/canvasScale;
    lbl.labelY=ptH-((my-doy)/canvasScale)-rectH;
    syncPosInputs();redrw();
  }
});

document.addEventListener('mousemove',e=>{
  if(!isDrag)return;
  const r=coEl.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  const lbl=getAL();if(!lbl)return;
  const{rectH}=ldims(lbl.text||'x',lbl.fontSize,lbl.fontId);
  lbl.labelX=(mx-dox)/canvasScale;
  lbl.labelY=ptH-((my-doy)/canvasScale)-rectH;
  syncPosInputs();redrw();
});
document.addEventListener('mouseup',()=>{isDrag=false;coEl.classList.remove('dragging');});

coEl.addEventListener('touchstart',e=>{
  if(!S.allPages.length)return;
  e.preventDefault();
  const t2=e.touches[0],r=coEl.getBoundingClientRect();

  dox=rectW*canvasScale/2;doy=rectH*canvasScale/2;isDrag=true;
  lbl.labelX=(mx-dox)/canvasScale;lbl.labelY=ptH-((my-doy)/canvasScale)-rectH;
  syncPosInputs();redrw();
},{passive:false});

/*
  STAMP APPROACH — Canvas → PNG → PDF image
  ─────────────────────────────────────────
  pdf-lib's built-in drawText is limited to WinAnsi (Latin only).
  Embedding custom TTF fonts still fails for Arabic because pdf-lib
  internally applies WinAnsi encoding to ALL text operations.

  Solution: render the entire label (rectangle + styled text) onto an
  offscreen <canvas> at 4× resolution using the browser's own font
  rendering (which handles Arabic, RTL, ligatures perfectly), export
  as PNG, then embed that PNG image into the PDF at the correct position.

  This means:
  • ANY language / script works (Arabic, Chinese, Emoji, etc.)
  • All stamp styles work exactly as the preview shows
  • No font downloading required
*/


// Convert dataURL to Uint8Array for pdf-lib
function dataUrlToBytes(dataUrl){
  const b64 = dataUrl.split(',')[1];
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return arr;
}

async function stamp(){
  if(!S.allPages.length) return;
  if(S.labels.some(l=>!l.text.trim())){ setSt(t('st_empty'),true); return; }
  setSt(t('st_stamp')); document.getElementById('dlb').disabled=true;
  try{
    const{PDFDocument, degrees} = PDFLib;
    const out = await PDFDocument.create();

    // ── Merge all source pages ──
    const fmap = new Map();
    for(const p of S.allPages){
      if(!fmap.has(p.buf)) fmap.set(p.buf,[]);
      fmap.get(p.buf).push(p.pidx);
    }
    for(const [buf,idxs] of fmap){
      const src = await PDFDocument.load(buf.slice(0));
      const pgs = await out.copyPages(src, idxs);
      pgs.forEach(p => out.addPage(p));
    }

    // ── Pre-render each label to PNG at 4× ──
    // We render at 4× the base pt size for crisp output
    // Scale factor: 4px per pt (288 dpi equivalent)
    const RENDER_SCALE = 4;
    const labelImages = [];
    for(const lbl of S.labels){
      if(!lbl.text.trim()) continue;
      const{rectW, rectH, padH, padV} = ldims(lbl.text, lbl.fontSize, lbl.fontId);
      const PAD = rectH * 0.6; // extra canvas space for rotation

      const cvW = Math.ceil((rectW + PAD*2) * RENDER_SCALE);
      const cvH = Math.ceil((rectH + PAD*2) * RENDER_SCALE);
      const cv  = document.createElement('canvas');
      cv.width  = cvW; cv.height = cvH;
      const ctx = cv.getContext('2d');

      // Draw label centred in the padded canvas
      const sc = RENDER_SCALE;
      const x  = PAD, y = PAD;
      const rw = rectW, rh = rectH;
      const cx2 = x + rw/2, cy2 = y + rh/2;
      const fsPx = lbl.fontSize;
      const fam  = getFam(lbl.fontId);
      const rc=lbl.rectColor, tc=lbl.textColor, bc=lbl.bordColor;

      ctx.scale(sc, sc);

      // apply rotation around label center
      ctx.save();
      if(lbl.rotation){ ctx.translate(cx2,cy2); ctx.rotate(lbl.rotation*Math.PI/180); ctx.translate(-cx2,-cy2); }
      ctx.globalAlpha = lbl.opacity;

      switch(lbl.style){
        case'solid':
          ctx.fillStyle=rgb2h(rc); rr(ctx,x,y,rw,rh,rh*.18); ctx.fill();
          ctxTxt(ctx,lbl.text,cx2,cy2,fsPx,fam,rgb2h(tc)); break;
        case'outline':
          ctx.strokeStyle=rgb2h(rc); ctx.lineWidth=Math.max(1.5,rh*.09);
          rr(ctx,x,y,rw,rh,rh*.18); ctx.stroke();
          ctxTxt(ctx,lbl.text,cx2,cy2,fsPx,fam,rgb2h(rc)); break;
        case'double':{
          const g=rh*.13;
          ctx.fillStyle=rgb2h(rc); rr(ctx,x,y,rw,rh,rh*.14); ctx.fill();
          ctx.strokeStyle=rgb2h(bc); ctx.lineWidth=Math.max(1,rh*.065);
          rr(ctx,x+g,y+g,rw-g*2,rh-g*2,rh*.08); ctx.stroke();
          ctxTxt(ctx,lbl.text,cx2,cy2,fsPx,fam,rgb2h(tc)); break;}
        case'stamp':{
          const bw=Math.max(2,rh*.1);
          ctx.strokeStyle=rgb2h(rc); ctx.lineWidth=bw*1.4; ctx.setLineDash([rh*.28,rh*.1]);
          rr(ctx,x+bw,y+bw,rw-bw*2,rh-bw*2,rh*.14); ctx.stroke(); ctx.setLineDash([]);
          ctxTxt(ctx,lbl.text,cx2,cy2,fsPx,fam,rgb2h(rc)); break;}
        case'grunge':{
          const bw=Math.max(2,rh*.1);
          ctx.strokeStyle=rgb2h(rc); ctx.lineWidth=bw*1.6; ctx.setLineDash([rh*.13,rh*.07]);
          rr(ctx,x+bw,y+bw,rw-bw*2,rh-bw*2,rh*.14); ctx.stroke(); ctx.setLineDash([]);
          ctx.shadowColor=rgb2h(rc); ctx.shadowBlur=fsPx*.22;
          ctxTxt(ctx,lbl.text,cx2,cy2,fsPx,fam,rgb2h(rc)); ctx.shadowBlur=0;
          const oa=ctx.globalAlpha; ctx.globalAlpha=oa*.28;
          ctx.strokeStyle=rgb2h(rc); ctx.lineWidth=Math.max(1,rh*.05);
          [[.22,.95,.3],[.5,.98,.52],[.72,.92,.75]].forEach(([y1f,x2f,y2f])=>{
            ctx.beginPath(); ctx.moveTo(x+rw*.02,y+rh*y1f); ctx.lineTo(x+rw*x2f,y+rh*y2f); ctx.stroke();
          });
          ctx.globalAlpha=oa; break;}
        case'ribbon':{
          ctx.save(); ctx.translate(cx2,cy2); ctx.rotate(-Math.PI/18); ctx.translate(-cx2,-cy2);
          const eg=rh*.15;
          ctx.fillStyle=rgb2h(rc);
          ctx.beginPath(); ctx.moveTo(x-eg,y); ctx.lineTo(x+rw+eg,y); ctx.lineTo(x+rw,y+rh); ctx.lineTo(x,y+rh); ctx.closePath(); ctx.fill();
          ctx.strokeStyle=rgb2h(bc); ctx.lineWidth=Math.max(1,rh*.06);
          ctx.beginPath(); ctx.moveTo(x-eg+rh*.18,y+rh*.18); ctx.lineTo(x+rw+eg-rh*.18,y+rh*.18); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(x-eg+rh*.18,y+rh*.82); ctx.lineTo(x+rw+eg-rh*.18,y+rh*.82); ctx.stroke();
          ctxTxt(ctx,lbl.text,cx2,cy2,fsPx*.92,fam,rgb2h(tc)); ctx.restore(); break;}
      }
      ctx.restore();

      const pngBytes = dataUrlToBytes(cv.toDataURL('image/png'));
      const pngImage = await out.embedPng(pngBytes);

      labelImages.push({
        lbl,
        pngImage,
        rectW, rectH,
        PAD,          // pt padding baked into the image
        imgWpt: cvW / RENDER_SCALE,   // image natural width in pt
        imgHpt: cvH / RENDER_SCALE,   // image natural height in pt
      });
    }

    // ── Stamp each page ──
    for(const pg of out.getPages()){
      const{width:pw, height:ph} = pg.getSize();
      for(const{lbl, pngImage, rectW, rectH, PAD, imgWpt, imgHpt} of labelImages){
        let{x:ptX, y:ptY} = getPos(lbl, pw, ph);
        ptX = Math.max(0, Math.min(pw-rectW, ptX));
        ptY = Math.max(0, Math.min(ph-rectH, ptY));

        // The PNG image is larger than the label by PAD on all sides.
        // Draw it offset by -PAD so the label content lands at (ptX, ptY).
        pg.drawImage(pngImage, {
          x:      ptX - PAD,
          y:      ptY - PAD,
          width:  imgWpt,
          height: imgHpt,
          opacity: 1,  // opacity already baked into PNG
        });
      }
    }

    const bytes = await out.save();
    saveAs(new Blob([bytes],{type:'application/pdf'}), 'stamped.pdf');
    setSt(t('st_done'));
  }catch(e){
    console.error(e);
    setSt('✗ '+e.message, true);
  }
  document.getElementById('dlb').disabled = !S.allPages.length;
}
function setSt(m,err=false){const el=document.getElementById('stat');el.textContent=m;el.className=err?'err':'';}
